# Configuración global de Prometheus
global:
  scrape_interval: 15s # Intervalo global de scraping
  evaluation_interval: 15s # Intervalo de evaluación de reglas
  external_labels:
    monitor: "sistema-monitorizacion"

# Configuración de reglas de alertas
rule_files:
  - "/etc/prometheus/rules/*.yml"

# Configuración de alertmanager (opcional)
# alerting:
#   alertmanagers:
#     - static_configs:
#         - targets:
#           - alertmanager:9093

# Configuración de trabajos de scraping
scrape_configs:
  # Monitorización del propio Prometheus
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]
    scrape_interval: 15s
    metrics_path: /metrics

  # Monitorización de Grafana
  - job_name: "grafana"
    static_configs:
      - targets: ["${alb_dns}"]
    scrape_interval: 30s
    metrics_path: /metrics

  # Monitorización de Loki
  - job_name: "loki"
    static_configs:
      - targets: ["loki.monitorizacion:3100"]
    scrape_interval: 15s
    metrics_path: /metrics

# Configuración de Remote Write para persistencia externa (S3 via AMP)
remote_write:
  - url: "${prometheus_endpoint}api/v1/remote_write"
    sigv4:
      region: "${region}"
    queue_config:
      max_samples_per_send: 1000
      max_shards: 200
      capacity: 2500
